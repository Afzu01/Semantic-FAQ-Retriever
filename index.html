<!doctype html>
<html lang='en'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Semantic FAQ Retriever</title>
  <style>
    body { margin:0; font-family: Segoe UI, Arial, sans-serif; color:#eef6ff; background: linear-gradient(140deg,#08131e,#0f2840); }
    .wrap { max-width: 920px; margin: 0 auto; padding: 40px 20px; }
    .card { background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:16px; padding:24px; }
    h1 { margin: 0 0 10px; }
    p { color:#c9d7e6; line-height:1.5; }
    h2 { margin:18px 0 8px; font-size:1.1rem; }
    ul { margin: 0; padding-left: 18px; color:#d6e5f2; line-height:1.45; }
    .btns { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    a { text-decoration:none; color:#051019; background:#30e6c0; padding:10px 14px; border-radius:999px; font-weight:700; }
    a.alt { background: rgba(255,255,255,0.15); color:#eef6ff; border:1px solid rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div class='wrap'>
    <div class='card'>
      <h1>Semantic FAQ Retriever</h1>
      <p>NLP retrieval service for support knowledge discovery.</p>
      <h2>Workflow</h2>
      <ul><li>1. Vectorize FAQ corpus</li><li>2. Compute semantic similarity for queries</li><li>3. Return ranked answer set with confidence</li></ul>
      <div class='btns'>
        <a href='https://github.com/Afzu01/Semantic-FAQ-Retriever#readme' target='_blank' rel='noopener noreferrer'>Open README</a>
        <a class='alt' href='https://github.com/Afzu01/portfolio' target='_blank' rel='noopener noreferrer'>Portfolio</a>
      </div>
    </div>
  </div>
